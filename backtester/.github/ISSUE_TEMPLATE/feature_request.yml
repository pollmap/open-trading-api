name: ✨ Feature request
description: Propose a new feature
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed solution

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: dropdown
    id: layer
    attributes:
      label: Affected layer
      multiple: true
      options:
        - Data (providers)
        - Analysis (macro regime, TA)
        - Graph (GothamGraph)
        - Orchestration (Ackman-Druckenmiller)
        - Execution (orders, risk gateway)
        - Capital Ladder
        - Intelligence (MCP, LLM)
        - Observability (dashboard)
        - Feedback (selb-tuning)
        - Docs / CI
