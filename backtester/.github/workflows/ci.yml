name: CI

on:
  push:
    branches: [main]
    paths:
      - "backtester/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "backtester/**"

defaults:
  run:
    working-directory: backtester

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          pip install -e ".[dev]"

      - name: Pytest
        run: |
          pytest tests/ -q \
            --ignore=tests/test_luxon_intelligence.py \
            --cov=kis_backtest \
            --cov-report=xml \
            --cov-report=term-missing \
            -m "not integration"

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: backtester/coverage.xml
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install ruff mypy

      - name: Ruff
        run: ruff check kis_backtest/ --output-format=github

      - name: Mypy (best-effort, non-blocking)
        run: mypy kis_backtest/luxon/ || true
