name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "backtester/docs/**"
      - "backtester/mkdocs.yml"
      - "backtester/kis_backtest/**/*.py"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: backtester

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install mkdocs
        run: |
          pip install mkdocs-material mkdocstrings[python]
          pip install -e .
      - name: Build
        run: mkdocs build --strict
      - uses: actions/upload-pages-artifact@v3
        with:
          path: backtester/site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
